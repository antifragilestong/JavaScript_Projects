

<!DOCTYPE html>
<html lang="en">
<head>
	<title>Javascript assignment</title>
	<meta charset="utf-8">
	<meta name="K Wong" content="XML">
	
</head>

<body> 
    <p id="XML_Example"></p> 
    <script> 
        var XML_Parser, XML_Document; 

        // 1. Wrap the XML string in quotes and use backticks or '+' correctly
        var Movie = "<movie>" + 
                    "<title>Schindler's List</title>" + 
                    "<director>Steven Spielberg</director>" + 
                    "<starring>Liam Neeson</starring>" + 
                    "<year>1993</year>" + 
                    "</movie>"; 

        // 2. Initialize the parser
        XML_Parser = new DOMParser(); 

        // 3. Use quotes for the MIME type "text/xml"
        XML_Document = XML_Parser.parseFromString(Movie, "text/xml"); 

        // 4. Extract and display the title
        document.getElementById("XML_Example").innerHTML = 
            XML_Document.getElementsByTagName("title")[0].childNodes[0].nodeValue; 
    </script> 
</body>


</html>
