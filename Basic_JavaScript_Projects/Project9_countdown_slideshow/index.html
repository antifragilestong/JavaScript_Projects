

<!DOCTYPE html>
<html lang="en">
<head>
	<title>Javascript assignment</title>
	<meta charset="utf-8">
	<meta name="K Wong" content="Countdown()">
	<link rel="stylesheet" type="text/css" href="./CSS/main.css">
</head>
<body>
	<main>

		<!---Countdown timer--->
		<br>
		<h3>Countdown timer</h3>
		<p>How many SECONDS would you like to set your alarm for?</p>
		<br>
		<p><input id="CDseconds" value="" />
		<button onclick="CDdown()">Click here</button></p>
		<br>
		<p id="CDtimer"></p>

		
		<!----Slideshow--->

		<div class="slideshow-container">

			<div class="mySlides fade">
  				<div class="numbertext">1 / 3</div>
  					<img src="./Images/car1.jpg" style="width:100%">
  				<div class="text">Caption Text</div>
			</div>

			<div class="mySlides fade">
  				<div class="numbertext">2 / 3</div>
  					<img src="./Images/car2.jpg" style="width:100%">
  				<div class="text">Caption Two</div>
			</div>

			<div class="mySlides fade">
  				<div class="numbertext">3 / 3</div>
  					<img src="./Images/car3.jpg" style="width:100%">
  				<div class="text">Caption Three</div>
			</div>

			<a class="prev" onclick="plusSlides(-1)">❮</a>
			<a class="next" onclick="plusSlides(1)">❯</a>

		</div>
		
		<br>

		<div style="text-align:center">
  			<span class="dot" onclick="currentSlide(1)"></span> 
  			<span class="dot" onclick="currentSlide(2)"></span> 
  			<span class="dot" onclick="currentSlide(3)"></span> 
		</div>


	</main>

	<script src="./JS/main.js"></script>

</body>


<footer>
		<p></p>

</footer>

</html>
